<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Radio AIR — Playlist Merger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:          #15161A;
    --panel:       #1D1F24;
    --panel-2:     #232529;
    --hair:        #34363D;
    --amber:       #E8A33D;
    --amber-dim:   #6b5328;
    --amber-glow:  rgba(232,163,61,0.45);
    --teal:        #4FB8A6;
    --red:         #D1495B;
    --text:        #ECE8DD;
    --muted:       #8B8D96;
    --row-playing: #1e2a28;
    --player-bg:   #101114;
  }
  body.theme-light{
    --bg:          #EDEFF1;
    --panel:       #FFFFFF;
    --panel-2:     #F4F5F7;
    --hair:        #D7D9DC;
    --amber:       #B8721E;
    --amber-dim:   #E7CBA1;
    --amber-glow:  rgba(184,114,30,0.20);
    --teal:        #2E8C7C;
    --red:         #C23A56;
    --text:        #1C1E22;
    --muted:       #6B6F76;
    --row-playing: #E4F2EF;
    --player-bg:   #FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Mono', monospace;
    padding:28px 20px 90px;
    transition:background .2s, color .2s;
  }
  .wrap{max-width:980px;margin:0 auto;}

  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    border-bottom:2px solid var(--hair);
    padding-bottom:16px;
    margin-bottom:24px;
  }
  .top-controls{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .lang-switch{display:flex;gap:6px;}
  .theme-btn{
    width:28px;height:28px;
    border-radius:50%;
    background:var(--panel-2);
    border:1px solid var(--hair);
    color:var(--text);
    font-size:13px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:border-color .15s, transform .15s;
  }
  .theme-btn:hover{border-color:var(--amber-dim);transform:rotate(12deg);}
  .lang-btn{
    background:var(--panel-2);
    border:1px solid var(--hair);
    color:var(--muted);
    font-family:'Oswald',sans-serif;
    font-size:11px;
    letter-spacing:0.06em;
    padding:5px 11px;
    border-radius:4px;
    cursor:pointer;
  }
  .lang-btn:hover{color:var(--text);}
  .lang-btn.active{
    color:var(--amber);
    border-color:var(--amber-dim);
    box-shadow:0 0 8px var(--amber-glow);
  }
  h1{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.06em;
    font-size:28px;
    margin:0;
    color:var(--text);
  }
  h1 span{color:var(--amber);}
  .subtitle{
    color:var(--muted);
    font-size:13px;
    margin-top:4px;
  }
  .freq{
    font-family:'Oswald', sans-serif;
    font-size:34px;
    letter-spacing:0.04em;
    color:var(--amber);
    text-shadow:0 0 14px var(--amber-glow);
    min-width:120px;
    text-align:right;
  }
  .freq small{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:0.08em;
    color:var(--muted);
    text-transform:uppercase;
    text-shadow:none;
  }

  .decks{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
    gap:16px;
    margin-bottom:18px;
  }
  .deck{
    background:var(--panel);
    border:1px solid var(--hair);
    border-radius:8px;
    padding:14px;
    position:relative;
    transition:border-color .15s, box-shadow .15s;
    display:flex;
    flex-direction:column;
    min-height:200px;
  }
  .deck.drag{
    border-color:var(--amber);
    box-shadow:0 0 0 1px var(--amber-dim) inset;
  }
  .deck.filled{border-color:var(--teal);}
  .deck-label{
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:0.08em;
    font-size:12px;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }
  .deck-label .led{
    width:7px;height:7px;border-radius:50%;
    background:var(--hair);
    margin-right:6px;
    display:inline-block;
  }
  .deck.filled .led{
    background:var(--teal);
    box-shadow:0 0 6px var(--teal);
  }
  .deck-drop{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    border:1px dashed var(--hair);
    border-radius:6px;
    padding:14px;
    cursor:pointer;
    text-align:center;
  }
  .deck-drop .hint{font-size:12px;color:var(--muted);}
  .deck-drop input{display:none;}
  .deck-info{
    margin-top:4px;
    font-size:12px;
    color:var(--muted);
  }
  .deck-info .fname{color:var(--text);}
  .deck-count{color:var(--teal);font-weight:600;}
  .deck-remove{
    background:none;border:none;color:var(--muted);
    font-size:11px;cursor:pointer;text-decoration:underline;
    padding:0;margin-top:8px;align-self:flex-start;
  }
  .deck-remove:hover{color:var(--red);}
  .deck-preview{
    margin-top:8px;
    max-height:80px;
    overflow:auto;
    font-size:11px;
    color:var(--muted);
    line-height:1.5;
    border-top:1px solid var(--hair);
    padding-top:6px;
    width:100%;
  }

  .add-deck{
    background:var(--panel-2);
    border:1px solid var(--hair);
    border-radius:8px;
    color:var(--muted);
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:0.06em;
    font-size:12px;
    cursor:pointer;
    min-height:200px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .add-deck:hover{color:var(--amber);border-color:var(--amber-dim);}

  .console{
    background:var(--panel);
    border:1px solid var(--hair);
    border-radius:8px;
    padding:18px;
    display:flex;
    flex-wrap:wrap;
    gap:18px;
    align-items:center;
    justify-content:space-between;
    margin-bottom:22px;
  }
  .opt-group{display:flex;flex-direction:column;gap:4px;}
  .opt-label{
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
  }
  select, .filename-input{
    background:var(--bg);
    border:1px solid var(--hair);
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    padding:7px 10px;
    border-radius:5px;
  }
  .toggle{
    display:flex;align-items:center;gap:8px;cursor:pointer;
    font-size:13px;color:var(--text);
  }
  .toggle input{accent-color:var(--amber);width:15px;height:15px;}

  .merge-btn{
    background:var(--amber);
    color:#1a1300;
    border:none;
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:0.08em;
    font-weight:700;
    font-size:15px;
    padding:14px 26px;
    border-radius:6px;
    cursor:pointer;
    transition:transform .08s, box-shadow .15s;
    box-shadow:0 0 0 rgba(232,163,61,0);
  }
  .merge-btn:hover{box-shadow:0 0 18px var(--amber-glow);}
  .merge-btn:active{transform:scale(0.97);}
  .merge-btn:disabled{
    background:var(--hair);color:var(--muted);cursor:not-allowed;box-shadow:none;
  }

  .result{
    background:var(--panel);
    border:1px solid var(--hair);
    border-radius:8px;
    padding:18px;
    display:none;
  }
  .result.show{display:block;}
  .result-head{
    display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;
    margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--hair);
  }
  .result-stats{display:flex;gap:24px;flex-wrap:wrap;}
  .stat .num{
    font-family:'Oswald',sans-serif;
    font-size:26px;
    color:var(--text);
  }
  .stat.dup .num{color:var(--red);}
  .stat.total .num{color:var(--teal);}
  .stat .lbl{
    font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;
  }
  .hint-small{font-size:11px;color:var(--muted);max-width:300px;text-align:right;}

  .station-list{
    border:1px solid var(--hair);
    border-radius:6px;
    max-height:420px;
    overflow:auto;
  }
  .station-row{
    display:grid;
    grid-template-columns:32px 28px 24px 1fr 36px 36px 90px;
    align-items:center;
    gap:10px;
    padding:8px 10px;
    border-bottom:1px solid #26282d;
    background:var(--panel);
    transition:background .12s;
  }
  .station-row:last-child{border-bottom:none;}
  .station-row:hover{background:#202227;}
  .station-row.dragging{opacity:0.35;}
  .station-row.drop-before{box-shadow:inset 0 2px 0 var(--amber);}
  .station-row.drop-after{box-shadow:inset 0 -2px 0 var(--amber);}
  .station-row.playing{background:var(--row-playing);}
  .station-row.playing .s-name{color:var(--teal);}

  .s-idx{color:var(--muted);font-size:11px;text-align:right;}
  .s-handle{
    cursor:grab;color:var(--muted);font-size:15px;text-align:center;
    user-select:none;
  }
  .s-handle:active{cursor:grabbing;}
  .s-main{overflow:hidden;}
  .s-name{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .s-url{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .icon-btn{
    width:30px;height:30px;border-radius:6px;border:1px solid var(--hair);
    background:var(--panel-2);color:var(--text);cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:13px;
    transition:border-color .12s, color .12s;
  }
  .icon-btn:hover{border-color:var(--amber-dim);}
  .icon-btn.play.is-playing{color:var(--teal);border-color:var(--teal);}
  .icon-btn.del:hover{color:var(--red);border-color:var(--red);}

  .download-row{
    display:flex;gap:12px;align-items:center;margin-top:16px;flex-wrap:wrap;
  }
  .eject-btn{
    background:var(--teal);
    color:#06241f;
    border:none;
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:0.06em;
    font-weight:700;
    font-size:13px;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
  }
  .eject-btn:hover{filter:brightness(1.1);}
  .empty-msg{color:var(--muted);font-size:13px;}

  .player-bar{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--player-bg);
    border-top:1px solid var(--hair);
    padding:12px 20px;
    display:none;
    align-items:center;
    gap:14px;
    z-index:50;
    transition:background .2s;
  }
  .player-bar.show{display:flex;}
  .player-led{
    width:10px;height:10px;border-radius:50%;background:var(--teal);
    box-shadow:0 0 8px var(--teal);
    flex:none;
    animation:pulse 1.4s infinite ease-in-out;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
  .player-info{flex:1;min-width:0;}
  .player-name{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .player-status{font-size:11px;color:var(--muted);}
  .player-status.error{color:var(--red);}
  .player-stop{
    background:none;border:1px solid var(--hair);color:var(--text);
    border-radius:6px;padding:8px 14px;cursor:pointer;font-family:'IBM Plex Mono',monospace;
    font-size:12px;
  }
  .player-stop:hover{border-color:var(--red);color:var(--red);}

  footer{
    text-align:center;color:var(--muted);font-size:11px;margin-top:30px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="top-controls">
        <div class="lang-switch" id="langSwitch">
          <button class="lang-btn" data-lang="ru">RU</button>
          <button class="lang-btn" data-lang="uk">UA</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <button class="theme-btn" id="themeToggle">☀</button>
      </div>
      <h1>AIR <span>RADIO</span> · <span id="titleSuffix"></span></h1>
      <div class="subtitle" id="subtitleText"></div>
    </div>
    <div class="freq" id="freqDisplay">000<small id="freqSmallText"></small></div>
  </header>

  <div class="decks" id="decks"></div>

  <div class="console">
    <div class="opt-group">
      <div class="opt-label" id="dedupeLabelText"></div>
      <label class="toggle"><input type="checkbox" id="dedupe" checked> <span id="dedupeCheckboxText"></span></label>
    </div>
    <div class="opt-group">
      <div class="opt-label" id="orderLabelText"></div>
      <select id="sortMode">
        <option value="asis" id="orderAsisOpt"></option>
        <option value="name" id="orderNameOpt"></option>
      </select>
    </div>
    <div class="opt-group">
      <div class="opt-label" id="filenameLabelText"></div>
      <input class="filename-input" id="outName" value="merged_playlist.csv">
    </div>
    <button class="merge-btn" id="mergeBtn" disabled></button>
  </div>

  <div class="result" id="result">
    <div class="result-head">
      <div class="result-stats">
        <div class="stat total"><div class="num" id="statTotal">0</div><div class="lbl" id="statTotalLbl"></div></div>
        <div class="stat"><div class="num" id="statSources">0</div><div class="lbl" id="statSourcesLbl"></div></div>
        <div class="stat dup"><div class="num" id="statDup">0</div><div class="lbl" id="statDupLbl"></div></div>
      </div>
      <div class="hint-small" id="hintSmallText"></div>
    </div>

    <div class="station-list" id="stationList"></div>

    <div class="download-row">
      <button class="eject-btn" id="deleteSelectedBtn" style="background:#D1495B;">Удалить выбранные</button>
      <button class="eject-btn" id="downloadBtn"></button>
      <span class="empty-msg" id="downloadHintText"></span>
    </div>
  </div>

</div>

<div class="player-bar" id="playerBar">
  <div class="player-led"></div>
  <div class="player-info">
    <div class="player-name" id="playerName">—</div>
    <div class="player-status" id="playerStatus"></div>
  </div>
  <button class="player-stop" id="playerStop"></button>
</div>

<footer id="footerText"></footer>

<script>
/* ---------- Переводы / Переклади / Translations ---------- */

const translations = {
  ru: {
    titleSuffix: "ОБЪЕДИНЕНИЕ",
    subtitle: "Слияние списков станций (формат: название · URL · флаг, через табуляцию)",
    freqLabel: "станций загружено",
    deckWord: "ДЕКА",
    deckStationsWord: "станций",
    deckHint: "Перетащи файл сюда<br>или нажми, чтобы выбрать",
    deckRemove: "убрать",
    addDeck: "+ Добавить деку",
    dedupeLabel: "Дубликаты",
    dedupeCheckbox: "Удалять по URL",
    orderLabel: "Порядок при объединении",
    orderAsis: "Как загружено",
    orderName: "По названию (А→Я)",
    filenameLabel: "Имя файла",
    mergeBtn: "Объединить ▶",
    statTotal: "в результате",
    statSources: "источников",
    statDup: "дублей убрано",
    hintSmall: "Перетаскивай станции за «⠿», чтобы менять порядок. ▶ — прослушать, ✕ — удалить.",
    emptyList: "Список пуст",
    titleDrag: "Перетащи, чтобы изменить порядок",
    titleListen: "Прослушать",
    titleDelete: "Удалить",
    downloadBtn: "⏏ Скачать CSV",
    downloadHint: "Тот же формат, что и в исходных файлах — можно сразу импортировать обратно в Radio AIR.",
    playerConnecting: "Подключение…",
    playerPlaying: "Воспроизведение",
    playerError: "Не удалось воспроизвести (формат потока не поддерживается браузером)",
    playerStop: "■ Стоп",
    footer: "Всё работает прямо в браузере — файлы никуда не отправляются.",
    themeToggleTitle: "Переключить тему"
  },
  uk: {
    titleSuffix: "ОБ'ЄДНАННЯ",
    subtitle: "Об'єднання списків станцій (формат: назва · URL · ознака, через табуляцію)",
    freqLabel: "станцій завантажено",
    deckWord: "ДЕКА",
    deckStationsWord: "станцій",
    deckHint: "Перетягни файл сюди<br>або натисни, щоб вибрати",
    deckRemove: "видалити",
    addDeck: "+ Додати деку",
    dedupeLabel: "Дублікати",
    dedupeCheckbox: "Видаляти за URL",
    orderLabel: "Порядок під час об'єднання",
    orderAsis: "Як завантажено",
    orderName: "За назвою (А→Я)",
    filenameLabel: "Ім'я файлу",
    mergeBtn: "Об'єднати ▶",
    statTotal: "у результаті",
    statSources: "джерел",
    statDup: "дублів знято",
    hintSmall: "Перетягуй станції за «⠿», щоб змінювати порядок. ▶ — прослухати, ✕ — видалити.",
    emptyList: "Список порожній",
    titleDrag: "Перетягни, щоб змінити порядок",
    titleListen: "Прослухати",
    titleDelete: "Видалити",
    downloadBtn: "⏏ Завантажити CSV",
    downloadHint: "Той самий формат, що й вихідні файли — можна одразу імпортувати назад у Radio AIR.",
    playerConnecting: "Підключення…",
    playerPlaying: "Відтворення",
    playerError: "Не вдалося відтворити (формат потоку не підтримується браузером)",
    playerStop: "■ Стоп",
    footer: "Усе працює прямо в браузері — файли нікуди не надсилаються.",
    themeToggleTitle: "Перемкнути тему"
  },
  en: {
    titleSuffix: "MERGER",
    subtitle: "Merge station playlists (format: name · URL · flag, tab-separated)",
    freqLabel: "stations loaded",
    deckWord: "DECK",
    deckStationsWord: "stations",
    deckHint: "Drop a file here<br>or click to choose",
    deckRemove: "remove",
    addDeck: "+ Add deck",
    dedupeLabel: "Duplicates",
    dedupeCheckbox: "Remove by URL",
    orderLabel: "Order when merging",
    orderAsis: "As loaded",
    orderName: "By name (A→Z)",
    filenameLabel: "File name",
    mergeBtn: "Merge ▶",
    statTotal: "total",
    statSources: "sources",
    statDup: "duplicates removed",
    hintSmall: "Drag stations by «⠿» to reorder. ▶ — listen, ✕ — delete.",
    emptyList: "List is empty",
    titleDrag: "Drag to reorder",
    titleListen: "Listen",
    titleDelete: "Delete",
    downloadBtn: "⏏ Download CSV",
    downloadHint: "Same format as the source files — ready to import straight back into Radio AIR.",
    playerConnecting: "Connecting…",
    playerPlaying: "Playing",
    playerError: "Couldn't play this stream (format not supported by the browser)",
    playerStop: "■ Stop",
    footer: "Everything runs in AIRur browser — files are never uploaded.",
    themeToggleTitle: "Toggle theme"
  }
};

let currentLang = 'ru';
function t(key){ return translations[currentLang][key] || key; }

function setLang(lang){
  currentLang = translations[lang] ? lang : 'ru';
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));

  document.getElementById('titleSuffix').textContent = t('titleSuffix');
  document.getElementById('subtitleText').textContent = t('subtitle');
  document.getElementById('dedupeLabelText').textContent = t('dedupeLabel');
  document.getElementById('dedupeCheckboxText').textContent = t('dedupeCheckbox');
  document.getElementById('orderLabelText').textContent = t('orderLabel');
  document.getElementById('orderAsisOpt').textContent = t('orderAsis');
  document.getElementById('orderNameOpt').textContent = t('orderName');
  document.getElementById('filenameLabelText').textContent = t('filenameLabel');
  document.getElementById('mergeBtn').textContent = t('mergeBtn');
  document.getElementById('statTotalLbl').textContent = t('statTotal');
  document.getElementById('statSourcesLbl').textContent = t('statSources');
  document.getElementById('statDupLbl').textContent = t('statDup');
  document.getElementById('hintSmallText').textContent = t('hintSmall');
  document.getElementById('downloadBtn').textContent = t('downloadBtn');
  document.getElementById('downloadHintText').textContent = t('downloadHint');
  document.getElementById('playerStop').textContent = t('playerStop');
  document.getElementById('footerText').textContent = t('footer');
  document.getElementById('themeToggle').title = t('themeToggleTitle');

  updateFreq();
  renderDecks();
  if(document.getElementById('result').classList.contains('show')){
    renderStationList();
  }
}

let currentTheme = 'dark';
function setTheme(theme){
  currentTheme = theme === 'light' ? 'light' : 'dark';
  document.body.classList.toggle('theme-light', currentTheme === 'light');
  document.getElementById('themeToggle').textContent = currentTheme === 'dark' ? '☀' : '☾';
  document.getElementById('themeToggle').title = t('themeToggleTitle');
}
document.getElementById('themeToggle').addEventListener('click', () => {
  setTheme(currentTheme === 'dark' ? 'light' : 'dark');
});

/* ---------- Парсинг плейлиста ---------- */

let deckIdCounter = 0;
const decks = {}; // id -> { filename, stations: [{name,url,flag}] } | null

function parsePlaylistText(text){
  const lines = text.split(/\r?\n/);
  const stations = [];
  for(const raw of lines){
    const line = raw.trim();
    if(!line) continue;
    let parts = line.split('\t');
    if(parts.length < 2) parts = line.split(',');
    if(parts.length < 2) continue;
    const name = parts[0].trim();
    const url = parts[1].trim();
    const flag = parts[2] !== undefined ? parts[2].trim() : '0';
    if(!url) continue;
    stations.push({name, url, flag});
  }
  return stations;
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ---------- Деки загрузки ---------- */

function renderDecks(){
  const container = document.getElementById('decks');
  container.innerHTML = '';
  Object.keys(decks).forEach(id => {
    const d = decks[id];
    const box = document.createElement('div');
    box.className = 'deck' + (d ? ' filled' : '');
    box.innerHTML = `
      <div class="deck-label"><span><span class="led"></span>${t('deckWord')} ${id}</span></div>
      <div class="deck-drop" data-id="${id}">
        ${d ? `
          <div class="deck-info">
            <div class="fname">${escapeHtml(d.filename)}</div>
            <div><span class="deck-count">${d.stations.length}</span> ${t('deckStationsWord')}</div>
          </div>
          <div class="deck-preview">${d.stations.slice(0,6).map(s=>escapeHtml(s.name)).join('<br>')}${d.stations.length>6?'<br>…':''}</div>
          <button class="deck-remove" data-id="${id}">${t('deckRemove')}</button>
        ` : `
          <div class="hint">${t('deckHint')}</div>
        `}
      </div>
      <input type="file" data-id="${id}" accept=".csv,.txt,.tsv,.m3u,.m3u8" style="display:none">
    `;
    container.appendChild(box);
  });

  const addBtn = document.createElement('div');
  addBtn.className = 'add-deck';
  addBtn.id = 'addDeckBtn';
  addBtn.textContent = t('addDeck');
  container.appendChild(addBtn);

  attachDeckHandlers();
  updateFreq();
  updateMergeBtn();
}

function attachDeckHandlers(){
  document.querySelectorAll('.deck-drop').forEach(drop => {
    const id = drop.dataset.id;
    const fileInput = document.querySelector(`input[type=file][data-id="${id}"]`);
    drop.addEventListener('click', (e) => {
      if(e.target.classList.contains('deck-remove')) return;
      fileInput.click();
    });
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.closest('.deck').classList.add('drag'); });
    drop.addEventListener('dragleave', () => drop.closest('.deck').classList.remove('drag'));
    drop.addEventListener('drop', e => {
      e.preventDefault();
      drop.closest('.deck').classList.remove('drag');
      const f = e.dataTransfer.files[0];
      if(f) loadFile(id, f);
    });
    fileInput.addEventListener('change', e => {
      const f = e.target.files[0];
      if(f) loadFile(id, f);
    });
  });
  document.querySelectorAll('.deck-remove').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      delete decks[id];
      renderDecks();
    });
  });
  const addDeckBtn = document.getElementById('addDeckBtn');
  if(addDeckBtn){
    addDeckBtn.addEventListener('click', () => {
      deckIdCounter++;
      decks[deckIdCounter] = null;
      renderDecks();
    });
  }
}

function loadFile(id, file){
  const reader = new FileReader();
  reader.onload = (e) => {
    const stations = parsePlaylistText(e.target.result);
    decks[id] = { filename: file.name, stations };
    renderDecks();
  };
  reader.readAsText(file);
}

function updateFreq(){
  const total = Object.values(decks).filter(Boolean).reduce((s,d)=>s+d.stations.length,0);
  document.getElementById('freqDisplay').childNodes[0].nodeValue = String(total).padStart(3,'0');
  document.getElementById('freqSmallText').textContent = t('freqLabel');
}

function updateMergeBtn(){
  const filled = Object.values(decks).filter(Boolean).length;
  document.getElementById('mergeBtn').disabled = filled < 1;
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.dataset.lang));
});

deckIdCounter = 2;
decks[1] = null;
decks[2] = null;
setLang('ru');

/* ---------- Объединение ---------- */

document.getElementById('mergeBtn').addEventListener('click', () => {
  const dedupe = document.getElementById('dedupe').checked;
  const sortMode = document.getElementById('sortMode').value;

  const filledDecks = Object.values(decks).filter(Boolean);
  let merged = [];
  filledDecks.forEach(d => merged.push(...d.stations));

  let dupCount = 0;
  if(dedupe){
    const seen = new Set();
    const deduped = [];
    for(const s of merged){
      const key = s.url.trim().toLowerCase().replace(/\/+$/,'');
      if(seen.has(key)){ dupCount++; continue; }
      seen.add(key);
      deduped.push(s);
    }
    merged = deduped;
  }

  if(sortMode === 'name'){
    merged = merged.slice().sort((a,b) => a.name.localeCompare(b.name));
  }

  lastMerged = merged;
  document.getElementById('statSources').textContent = filledDecks.length;
  document.getElementById('statDup').textContent = dupCount;
  document.getElementById('result').classList.add('show');
  renderStationList();
});

/* ---------- Редактируемый список станций ---------- */

let lastMerged = [];
let dragSrcIndex = null;
let currentPlayingIndex = -1;
const player = new Audio();


function copyUrl(url){
  navigator.clipboard.writeText(url).then(()=>{
    alert('Ссылка скопирована');
  });
}

function deleteSelectedStations(){
  const checked = [...document.querySelectorAll('.station-check:checked')]
    .map(el => Number(el.dataset.index))
    .sort((a,b)=>b-a);

  checked.forEach(idx => {
    if(currentPlayingIndex === idx) stopPlayback();
    lastMerged.splice(idx,1);
  });

  renderStationList();
}

function renderStationList(){
  document.getElementById('statTotal').textContent = lastMerged.length;
  const list = document.getElementById('stationList');

  if(lastMerged.length === 0){
    list.innerHTML = `<div style="padding:18px;color:var(--muted);font-size:13px;text-align:center;">${t('emptyList')}</div>`;
    return;
  }

  list.innerHTML = lastMerged.map((s, i) => `
    <div class="station-row${i===currentPlayingIndex ? ' playing':''}" draggable="true" data-index="${i}">
      <div><input type="checkbox" class="station-check" data-index="${i}"></div>
      <div class="s-idx">${i+1}</div>
      <div class="s-handle" title="${t('titleDrag')}">⠿</div>
      <div class="s-main">
        <div class="s-name">${escapeHtml(s.name)}</div>
        <div class="s-url" title="${escapeHtml(s.url)}">${escapeHtml(s.url)}</div>
      </div>
      <button class="icon-btn play${i===currentPlayingIndex ? ' is-playing':''}" data-index="${i}" title="${t('titleListen')}">${i===currentPlayingIndex ? '❙❙' : '▶'}</button>
      <button class="icon-btn del" data-index="${i}" title="${t('titleDelete')}">✕</button>
      <button class="icon-btn copy-btn" data-url="${escapeHtml(s.url)}" style="width:auto;padding:0 8px;">⧉</button>
    </div>
  `).join('');

  attachStationHandlers();
}

function attachStationHandlers(){
  const rows = document.querySelectorAll('.station-row');

  rows.forEach(row => {
    row.addEventListener('dragstart', e => {
      dragSrcIndex = Number(row.dataset.index);
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      rows.forEach(r => r.classList.remove('drop-before','drop-after'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      const rect = row.getBoundingClientRect();
      const before = (e.clientY - rect.top) < rect.height / 2;
      rows.forEach(r => r.classList.remove('drop-before','drop-after'));
      row.classList.add(before ? 'drop-before' : 'drop-after');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      const targetIndex = Number(row.dataset.index);
      const rect = row.getBoundingClientRect();
      const before = (e.clientY - rect.top) < rect.height / 2;
      let insertAt = before ? targetIndex : targetIndex + 1;
      if(dragSrcIndex === null || dragSrcIndex === targetIndex) return;

      const moved = lastMerged.splice(dragSrcIndex, 1)[0];
      if(dragSrcIndex < insertAt) insertAt--;
      lastMerged.splice(insertAt, 0, moved);

      if(currentPlayingIndex === dragSrcIndex){
        currentPlayingIndex = insertAt;
      }
      dragSrcIndex = null;
      renderStationList();
    });
  });

  document.querySelectorAll('.icon-btn.play').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = Number(btn.dataset.index);
      if(currentPlayingIndex === idx){
        stopPlayback();
      } else {
        playStation(idx);
      }
    });
  });

  
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => copyUrl(btn.dataset.url));
  });

  document.querySelectorAll('.icon-btn.del').forEach(btn => {

    btn.addEventListener('click', () => {
      const idx = Number(btn.dataset.index);
      if(currentPlayingIndex === idx) stopPlayback();
      else if(currentPlayingIndex > idx) currentPlayingIndex--;
      lastMerged.splice(idx, 1);
      renderStationList();
    });
  });
}

function playStation(idx){
  const s = lastMerged[idx];
  if(!s) return;
  currentPlayingIndex = idx;
  player.pause();
  player.src = s.url;
  player.volume = 1;
  showPlayerBar(s.name, t('playerConnecting'), false);
  player.play().then(() => {
    showPlayerBar(s.name, t('playerPlaying'), false);
  }).catch(() => {
    showPlayerBar(s.name, t('playerError'), true);
  });
  renderStationList();
}

player.addEventListener('error', () => {
  if(currentPlayingIndex >= 0){
    const s = lastMerged[currentPlayingIndex];
    if(s) showPlayerBar(s.name, t('playerError'), true);
  }
});

function stopPlayback(){
  player.pause();
  player.removeAttribute('src');
  currentPlayingIndex = -1;
  hidePlayerBar();
  renderStationList();
}

function showPlayerBar(name, status, isError){
  document.getElementById('playerBar').classList.add('show');
  document.getElementById('playerName').textContent = name;
  const statusEl = document.getElementById('playerStatus');
  statusEl.textContent = status;
  statusEl.classList.toggle('error', !!isError);
}

function hidePlayerBar(){
  document.getElementById('playerBar').classList.remove('show');
}

document.getElementById('playerStop').addEventListener('click', stopPlayback);

/* ---------- Скачивание ---------- */


document.getElementById('deleteSelectedBtn')?.addEventListener('click', deleteSelectedStations);

document.getElementById('downloadBtn').addEventListener('click', () => {

  if(!lastMerged.length) return;
  const text = lastMerged.map(s => `${s.name}\t${s.url}\t${s.flag}`).join('\n') + '\n';
  const blob = new Blob([text], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  let fname = document.getElementById('outName').value.trim() || 'merged_playlist.csv';
  a.href = url;
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});
</script>
</body>
